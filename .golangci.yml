version: "2"

linters:
  default: all
  disable:
    - depguard
    - forbidigo
    - varnamelen
    - wsl
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
